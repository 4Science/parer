# ─── Integration test overrides ─────────────────────────────────────────────
# Loaded by ParerConfigurationEnvironmentPostProcessor from classpath:config/local.cfg.
# Overrides parer.cfg for the test environment.
spring.profiles.active=test,mock

# ─── H2 in-memory database (replaces PostgreSQL) ─────────────────────────────
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:parer;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
db.username=sa
db.password=
db.dialect=org.hibernate.dialect.H2Dialect
db.schema=public
db.maxconnections=5
db.maxwait=5000
db.maxidle=5

# ─── AWS credentials (S3Client is @MockBean or LocalStack in tests) ──────────
parer.aws.access-key=test-access-key
parer.aws.secret-key=test-secret-key

# ─── FTPS: values only used if FtpsClientImpl is active (profile=!sftp) ─
ftps.host=localhost
ftps.port=2121
ftps.user=testuser
ftps.password=testpass
ftps.upload.dir=/files
ftps.connect.timeout.ms=5000
ftps.data.timeout.ms=10000
ftps.threads=2

# ─── SIP XSD validation (enable with bundled schema) ─────────────────────────
parer.sip.xsd-path=xsd/WSRequestUnico1_5.xsd

# ─── ParER versatore (versione test) ─────────────────────────────────────────
parer.versatore.password=test-password
parer.versatore.ente=TEST_ENTE
parer.versatore.struttura=TEST_STRUTTURA
parer.versatore.userid=test-worker

# ── ParER SOAP WS-Security ────────────────────────────────────────────────────
parer.soap.wsse.username      =
parer.soap.wsse.password      =
parer.soap.wsse.actions       = UsernameToken
parer.soap.wsse.password.type = PasswordText